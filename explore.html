<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bubble — Explore</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="explore.css"/>
</head>
<body>
  <div id="headerMount"></div>
  <div class="app-layout">
    <div id="sidebarMount"></div>
    <main class="main-feed">
      <div class="explore-search-bar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </span>
          <input class="search-input" type="text" id="searchInput" placeholder="Search users, posts, tags…" autofocus/>
          <button class="search-clear" id="searchClear" style="display:none">✕</button>
        </div>
        <div class="explore-tags" id="exploreTags"></div>
      </div>

      <div class="explore-grid" id="exploreGrid"></div>
      <div class="search-results" id="searchResults" style="display:none"></div>
    </main>
  </div>
  <div id="bottomNavMount"></div>
  <div id="toast-container"></div>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="explore.js"></script>
</body>
</html>
