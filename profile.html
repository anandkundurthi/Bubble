<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Bubble — Profile</title>
  <link rel="stylesheet" href="shared.css"/>
  <link rel="stylesheet" href="profile.css"/>
</head>
<body>
  <div id="headerMount"></div>
  <div class="app-layout">
    <div id="sidebarMount"></div>
    <main class="main-feed profile-feed">

      <!-- Profile Header -->
      <div class="profile-header" id="profileHeader"></div>

      <!-- Stats row -->
      <div class="profile-stats" id="profileStats"></div>

      <!-- Bio -->
      <div class="profile-bio-section" id="profileBio"></div>

      <!-- Action buttons -->
      <div class="profile-actions" id="profileActions"></div>

      <!-- Tab bar -->
      <div class="profile-tabs">
        <button class="ptab active" data-tab="posts" onclick="switchTab(this,'posts')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Posts
        </button>
        <button class="ptab" data-tab="saved" onclick="switchTab(this,'saved')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Saved
        </button>
        <button class="ptab" data-tab="tagged" onclick="switchTab(this,'tagged')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          Tagged
        </button>
      </div>

      <!-- Post grid -->
      <div class="profile-grid" id="profileGrid"></div>

      <!-- Edit Profile Modal -->
      <div class="edit-modal" id="editModal" style="display:none">
        <div class="edit-modal-backdrop" onclick="closeEditModal()"></div>
        <div class="edit-modal-card page-enter">
          <div class="edit-modal-header">
            <h2>Edit Profile</h2>
            <button class="icon-btn" onclick="closeEditModal()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <form class="edit-form" id="editForm">
            <div class="edit-avatar-row" id="editAvatarRow"></div>
            <div class="input-group">
              <label class="input-label">Full Name</label>
              <input class="input-field" type="text" id="editName"/>
            </div>
            <div class="input-group">
              <label class="input-label">Username</label>
              <input class="input-field" type="text" id="editUsername"/>
            </div>
            <div class="input-group">
              <label class="input-label">Bio</label>
              <textarea class="input-field" id="editBio" rows="3" style="resize:vertical;min-height:80px"></textarea>
            </div>
            <div style="display:flex;gap:10px;margin-top:8px">
              <button type="button" class="btn btn-secondary btn-full" onclick="closeEditModal()">Cancel</button>
              <button type="submit" class="btn btn-primary btn-full" id="saveProfileBtn">Save Changes</button>
            </div>
          </form>
        </div>
      </div>

    </main>
  </div>
  <div id="bottomNavMount"></div>
  <div id="toast-container"></div>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="profile.js"></script>
</body>
</html>
